<!doctype html>
<html lang="en">
  <head>
    <title>Log In - JobBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50 antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
      <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-emerald-600 tracking-tight">
          Job Portal
        </a>
      </div>
    </nav>

    <div class="max-w-md mx-auto px-4 py-16">

      <!-- Card -->
      <div class="bg-white border border-gray-200 rounded-xl p-8">

        <!-- Header -->
        <div class="mb-8 text-center">
          <h1 class="text-xl font-bold text-gray-900">Welcome back</h1>
          <p class="text-sm text-gray-400 mt-1">Log in to your JobBoard account</p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">
          {% csrf_token %}

          <!-- Username -->
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1.5">Username</label>
            <input
              type="text"
              name="username"
              placeholder="Enter your username"
              class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
              required
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1.5">Password</label>
            <input
              type="password"
              name="password"
              placeholder="Enter your password"
              class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
              required
            />
          </div>

          <!-- Submit -->
          <div class="pt-2">
            <button
              type="submit"
              class="w-full bg-emerald-600 text-white text-sm font-medium px-6 py-3 rounded-xl hover:bg-emerald-700 transition-colors"
            >
              Log In
            </button>
          </div>

        </form>

        <!-- Signup link -->
        <p class="text-center text-sm text-gray-400 mt-6">
          Don't have an account?
          <a href="/accounts/signup/" class="text-emerald-600 hover:text-emerald-700 font-medium transition-colors">Sign up</a>
        </p>

      </div>
    </div>

  </body>
</html>
