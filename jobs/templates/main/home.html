<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home - JobBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50:  '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            400: '#34d399',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans antialiased">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">

        <!-- Logo -->
        <a href="/" class="text-2xl font-bold text-emerald-600 tracking-tight">
            Job Portal
        </a>

        <!-- Links -->
        <div class="flex items-center space-x-6">
            <a href="/" class="text-gray-900 font-medium text-sm">Home</a>
            <a href="/jobs/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">Jobs</a>
            <a href="/accounts/login/"
               class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-700 transition-colors">
                Login
            </a>
        </div>

    </div>
</nav>

<!-- Hero Section -->
<div class="min-h-screen flex flex-col items-center justify-center text-center px-6">

    <!-- Badge -->
    <span class="inline-block bg-emerald-50 text-emerald-700 text-xs font-medium px-3 py-1 rounded-full mb-6 border border-emerald-200">
        10,000+ Jobs Available
    </span>

    <h1 class="text-5xl font-bold text-gray-900 mb-4 leading-tight max-w-2xl">
        Find Your Next <span class="text-emerald-600">Opportunity</span>
    </h1>

    <p class="text-gray-500 text-lg mb-10 max-w-md">
        Browse thousands of jobs and apply in one click. Your dream career starts here.
    </p>

    <div class="flex items-center gap-4">
        <a href="/jobs/"
           class="bg-emerald-600 text-white px-6 py-3 rounded-xl text-sm font-medium hover:bg-emerald-700 transition-colors">
            Browse Jobs
        </a>
        <a href="/jobs/add/"
           class="text-gray-600 px-6 py-3 rounded-xl text-sm font-medium border border-gray-200 hover:border-gray-300 hover:bg-gray-50 transition-colors">
            Post a Job
        </a>
    </div>

    <!-- Stats row -->
    <div class="flex items-center gap-8 mt-16 pt-10 border-t border-gray-100">
        <div class="text-center">
            <p class="text-2xl font-bold text-gray-900">10k+</p>
            <p class="text-xs text-gray-400 mt-1">Active Jobs</p>
        </div>
        <div class="w-px h-8 bg-gray-200"></div>
        <div class="text-center">
            <p class="text-2xl font-bold text-gray-900">2k+</p>
            <p class="text-xs text-gray-400 mt-1">Companies</p>
        </div>
        <div class="w-px h-8 bg-gray-200"></div>
        <div class="text-center">
            <p class="text-2xl font-bold text-gray-900">50k+</p>
            <p class="text-xs text-gray-400 mt-1">Job Seekers</p>
        </div>
    </div>

</div>

</body>
</html>
