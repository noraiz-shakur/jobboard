<!doctype html>
<html lang="en">
  <head>
    <title>Post a Job - JobBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50 antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
      <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-emerald-600 tracking-tight">
          Job Portal
        </a>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">Home</a>
          <a href="/jobs/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">Jobs</a>
        </div>
      </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-12">

      <!-- Back link -->
      <a href="/jobs/" class="text-sm text-gray-400 hover:text-gray-600 transition-colors mb-6 inline-block">
        ← Back to Jobs
      </a>

      <!-- Card -->
      <div class="bg-white border border-gray-200 rounded-xl p-8">

        <!-- Header -->
        <div class="mb-8">
          <h1 class="text-xl font-bold text-gray-900">Post a New Job</h1>
          <p class="text-sm text-gray-400 mt-1">Fill in the details below to publish your listing</p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">
          {% csrf_token %}

          <!-- Job Title -->
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1.5">Job Title</label>
            <input
              type="text"
              name="title"
              placeholder="e.g. Frontend Developer"
              class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
              required
            />
          </div>

          <!-- Company -->
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1.5">Company Name</label>
            <input
              type="text"
              name="company"
              placeholder="e.g. Systems Ltd"
              class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
              required
            />
          </div>

          <!-- Description -->
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1.5">Job Description</label>
            <textarea
              name="description"
              placeholder="Describe the role, responsibilities, and requirements..."
              rows="5"
              class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition resize-none"
              required
            ></textarea>
          </div>

          <!-- Location + Salary (side by side) -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs text-gray-500 font-medium mb-1.5">Location</label>
              <input
                type="text"
                name="location"
                placeholder="e.g. Lahore, Remote"
                class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
                required
              />
            </div>
            <div>
              <label class="block text-xs text-gray-500 font-medium mb-1.5">Salary</label>
              <input
                type="text"
                name="salary"
                placeholder="e.g. PKR 80,000/month"
                class="w-full border border-gray-200 text-sm text-gray-900 placeholder-gray-400 p-3 rounded-lg focus:outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400 transition"
                required
              />
            </div>
          </div>

          <!-- Submit -->
          <div class="pt-2">
            <button
              type="submit"
              class="w-full bg-emerald-600 text-white text-sm font-medium px-6 py-3 rounded-xl hover:bg-emerald-700 transition-colors"
            >
              Publish Job
            </button>
          </div>

        </form>

      </div>
    </div>

  </body>
</html>
