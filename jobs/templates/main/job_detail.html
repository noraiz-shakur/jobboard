<!doctype html>
<html lang="en">
  <head>
    <title>{{ job.title }} - JobBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50 antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
      <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-emerald-600 tracking-tight">
          Job Portal
        </a>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">Home</a>
          <a href="/jobs/" class="text-gray-500 hover:text-gray-900 text-sm transition-colors">Jobs</a>
        </div>
      </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-12">

      <!-- Back link -->
      <a href="/jobs/" class="text-sm text-gray-400 hover:text-gray-600 transition-colors mb-6 inline-block">
        ← Back to Jobs
      </a>

      <!-- Card -->
      <div class="bg-white border border-gray-200 rounded-xl p-8">

        <!-- Job Title -->
        <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ job.title }}</h1>

        <!-- Info rows -->
        <div class="space-y-5 text-sm">

          <!-- Description -->
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wide font-medium mb-1">Job Description</p>
            <p class="text-gray-600 leading-relaxed">{{ job.description }}</p>
          </div>

          <div class="border-t border-gray-100"></div>

          <!-- Salary -->
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400 uppercase tracking-wide font-medium">Salary</p>
            <p class="text-emerald-600 font-semibold">{{ job.salary }}</p>
          </div>

          <div class="border-t border-gray-100"></div>

          <!-- Location -->
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400 uppercase tracking-wide font-medium">Location</p>
            <p class="text-gray-700">{{ job.location }}</p>
          </div>

          <div class="border-t border-gray-100"></div>

          <!-- Job Type -->
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400 uppercase tracking-wide font-medium">Job Type</p>
            <span class="bg-emerald-50 text-emerald-700 text-xs font-medium px-3 py-1 rounded-full border border-emerald-200">
              {{ job.job_type }}
            </span>
          </div>

        </div>

        <!-- Apply Button -->
        <div class="mt-8 pt-6 border-t border-gray-100">
          <a href="/jobs/{{ job.id }}/apply/"
             class="block text-center bg-emerald-600 text-white text-sm font-medium px-6 py-3 rounded-xl hover:bg-emerald-700 transition-colors">
            Apply Now
          </a>
        </div>

      </div>
    </div>

  </body>
</html>
