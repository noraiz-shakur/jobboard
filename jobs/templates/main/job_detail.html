<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <!-- Job Title -->
    <h1 class="text-3xl font-bold text-blue-600 mb-4">
        {{ job.title }}
    </h1>

    <!-- Job Info -->
    <div class="space-y-3 text-gray-700">

        <p>
            <span class="font-semibold">Job Description:</span><br>
            {{ job.description }}
        </p>

        <p>
            <span class="font-semibold">Salary:</span>
            <span class="text-green-600 font-bold">
                {{ job.salary }}
            </span>
        </p>

        <p>
            <span class="font-semibold">Location:</span>
            {{ job.location }}
        </p>

        <p>
            <span class="font-semibold">Job Type:</span>
            <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-sm">
                {{ job.job_type }}
            </span>
        </p>

    </div>

    <!-- Back Button -->
    <div class="mt-6">
        <a href="/jobs/"
           class="inline-block bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">
            ← Back to Jobs
        </a>
    </div>

</div>

</body>
</html>
